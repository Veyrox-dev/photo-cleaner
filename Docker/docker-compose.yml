# PhotoCleaner Docker Compose v0.8.4
# Verwendung:
#   docker compose -f Docker/docker-compose.yml build
#   docker compose -f Docker/docker-compose.yml run --rm smoke-test
#   docker compose -f Docker/docker-compose.yml run --rm cli index /data

services:

  # --- Smoke-Test: beweist Import + CLI-Startup + Lizenzmodul ----------
  smoke-test:
    build:
      context: ..          # Projekt-Root (nicht Docker/)
      dockerfile: Docker/Dockerfile
    image: photocleaner:0.8.4
    environment:
      - PHOTOCLEANER_MODE=RELEASE
      - PHOTOCLEANER_HEADLESS=1
    command: python smoke_test.py

  # --- CLI: Fotos headless indexieren ---------------------------------
  cli:
    build:
      context: ..
      dockerfile: Docker/Dockerfile
    image: photocleaner:0.8.4
    volumes:
      - ${PHOTO_DIR:-./photos}:/data
      - photocleaner-db:/app/db
    environment:
      - PHOTOCLEANER_MODE=RELEASE
      - PHOTOCLEANER_HEADLESS=1
    command: python -m photo_cleaner.cli index /data

volumes:
  photocleaner-db:

