version: '3.8'

services:
  photocleaner:
    build: .
    image: photocleaner:0.5.5
    container_name: photocleaner
    volumes:
      # Mount your photo directory
      - ./photos:/data
      # Mount database for persistence
      - ./db:/app/db
    environment:
      - PHOTOCLEANER_MODE=RELEASE
      - PYTHONUNBUFFERED=1
    # For GUI (requires X11 forwarding on Linux)
    # environment:
    #   - DISPLAY=${DISPLAY}
    # volumes:
    #   - /tmp/.X11-unix:/tmp/.X11-unix
    command: python run_ui.py --input /data --output /data/organized

  # CLI-only version (no GUI)
  photocleaner-cli:
    build: .
    image: photocleaner:0.5.5
    container_name: photocleaner-cli
    volumes:
      - ./photos:/data
    command: python -m photo_cleaner.cli index /data
