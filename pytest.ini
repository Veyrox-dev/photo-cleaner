[pytest]
# PyTest Configuration for PhotoCleaner
# Version: 0.5.5

# Test Discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output Options
addopts =
    # Verbosity
    -v
    --tb=short
    
    # Coverage (requires: pip install pytest-cov)
    # --cov=src/photo_cleaner
    # --cov-report=html:htmlcov
    # --cov-report=term-missing
    # --cov-fail-under=5
    
    # Warnings
    --strict-markers
    -W ignore::DeprecationWarning
    -W ignore::UserWarning:mtcnn
    
    # Performance
    --maxfail=5
    
    # Output
    --color=yes

# Markers for Test Organization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, external dependencies)
    ui: UI/GUI tests (requires display)
    slow: Slow tests (> 1 second)
    cache: Cache system tests
    license: License/authentication tests
    multiprocessing: Tests using multiprocessing
    theme: Theme switching tests
    pipeline: Image processing pipeline tests

# Warning Filters
filterwarnings =
    ignore:pkg_resources is deprecated as an API.*:UserWarning:mtcnn\.mtcnn
    
# Test Filtering
norecursedirs = 
    .git
    .venv
    venv
    build
    dist
    *.egg
    __pycache__
    .pytest_cache
    htmlcov

# Timeout (optional - requires pytest-timeout)
# timeout = 300

# Coverage Options
[coverage:run]
source = src/photo_cleaner
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */.venv/*
    */build/*
    */dist/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod
    pass

precision = 2
skip_empty = True

[coverage:html]
directory = htmlcov
