name: Smoke Test (Windows Frozen Build)

# Manuell auslösbar ODER automatisch nach erfolgreichem Build-Workflow.
# Baut NICHT neu - lädt das Artefakt aus build.yml und testet es.
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build & Release"]
    types: [completed]
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke-test-windows:
    name: Windows Frozen Build Smoke Test
    runs-on: windows-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      # -- 1. Repo auschecken -------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -- 2a. Artefakt vom auslösenden Build-Run laden -----------------------
      - name: Download artifact from triggering build
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: builds-windows-latest
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: artifacts/

      # -- 2b. Bei manuellem Trigger: letzten erfolgreichen Build laden --------
      - name: Download latest successful build artifact (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $runId = gh run list `
            --workflow=build.yml `
            --status=success `
            --limit=1 `
            --json databaseId `
            --jq '.[0].databaseId'

          if (-not $runId) {
            Write-Error "Kein erfolgreicher build.yml-Run gefunden. Bitte zuerst 'Build & Release' ausfuehren."
            exit 1
          }
          Write-Host "Lade Artefakt von Run $runId ..."
          gh run download $runId --name builds-windows-latest --dir artifacts/

      # -- 3. ZIP entpacken -> PhotoCleaner/ ----------------------------------
      - name: Extract EXE from artifact
        shell: pwsh
        run: |
          $zip = Get-ChildItem artifacts/ -Filter "*.zip" | Select-Object -First 1
          if (-not $zip) {
            Write-Error "Kein ZIP-Artefakt in artifacts/ gefunden"
            Get-ChildItem artifacts/ -Recurse | Select-Object FullName
            exit 1
          }
          Write-Host "Entpacke: $($zip.Name)"
          Expand-Archive -Path $zip.FullName -DestinationPath "."
          Write-Host "Inhalt nach dem Entpacken:"
          Get-ChildItem "PhotoCleaner/" | Select-Object Name, Length | Format-Table -AutoSize

      # -- 4. EXE existiert und ist gross genug -------------------------------
      - name: Verify EXE exists
        shell: pwsh
        run: |
          $exe = "PhotoCleaner/PhotoCleaner.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "FAIL: PhotoCleaner.exe nicht gefunden"
            exit 1
          }
          $sizeMB = [math]::Round((Get-Item $exe).Length / 1MB, 1)
          Write-Host "PASS: EXE gefunden ($sizeMB MB)"
          if ($sizeMB -lt 10) {
            Write-Warning "EXE ist ungewoehnlich klein ($sizeMB MB) - moeglicher Build-Fehler"
          }

      # -- 5. EXE starten + auf Crash pruefen ---------------------------------
      - name: EXE startup smoke test
        shell: pwsh
        timeout-minutes: 2
        run: |
          $env:PHOTOCLEANER_HEADLESS = "1"
          $env:PHOTOCLEANER_MODE     = "RELEASE"
          $env:CUDA_VISIBLE_DEVICES  = "-1"

          $proc = Start-Process `
            -FilePath "PhotoCleaner/PhotoCleaner.exe" `
            -ArgumentList "--smoke-test" `
            -PassThru -NoNewWindow `
            -RedirectStandardOutput "smoke_stdout.txt" `
            -RedirectStandardError  "smoke_stderr.txt"

          $exited = $proc.WaitForExit(30000)

          $out = if (Test-Path smoke_stdout.txt) { Get-Content smoke_stdout.txt -Raw } else { "(leer)" }
          $err = if (Test-Path smoke_stderr.txt) { Get-Content smoke_stderr.txt -Raw } else { "(leer)" }
          Write-Host "=== STDOUT ==="; Write-Host $out
          Write-Host "=== STDERR ==="; Write-Host $err

          if (-not $exited) {
            $proc.Kill()
            Write-Host "PASS: EXE laeuft stabil (kein sofortiger Crash); nach 30s sauber beendet"
            exit 0
          }

          $code = $proc.ExitCode
          Write-Host "Exit-Code: $code"
          if ($code -eq 0 -or $code -eq 42) {
            Write-Host "PASS: EXE sauber beendet (Exit $code)"
          } else {
            Write-Error "FAIL: EXE mit Exit-Code $code abgebrochen"
            exit 1
          }

      # -- 6. App-Log auf Crash-Marker pruefen --------------------------------
      - name: Check log for crash markers
        if: always()
        shell: pwsh
        run: |
          $logPath = "$env:APPDATA\PhotoCleaner\PhotoCleaner.log"
          if (-not (Test-Path $logPath)) {
            Write-Host "INFO: Keine Log-Datei vorhanden"
            exit 0
          }
          Write-Host "=== PhotoCleaner.log (letzte 50 Zeilen) ==="
          Get-Content $logPath | Select-Object -Last 50
          $log = Get-Content $logPath -Raw
          $hits = @("Traceback", "CRITICAL", "Fatal", "Access violation") | Where-Object { $log -match $_ }
          if ($hits) {
            Write-Error "FAIL: Crash-Marker gefunden: $($hits -join ', ')"
            exit 1
          }
          Write-Host "PASS: Keine Crash-Marker im Log"

      # -- 7. Logs als Artefakt hochladen -------------------------------------
      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-logs
          path: |
            smoke_stdout.txt
            smoke_stderr.txt
          retention-days: 14
