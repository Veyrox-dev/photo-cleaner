name: Tests & Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  test:
    name: Test Suite (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.12', '3.13']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-xdist
    
    - name: Run unit tests
      run: |
        pytest tests/unit/ -v --tb=short -x
    
    - name: Run integration tests
      run: |
        pytest tests/integration/ -v --tb=short -x
    
    - name: Run end-to-end tests
      run: |
        pytest tests/e2e/ -v --tb=short -x
    
    - name: Run all tests with coverage
      run: |
        pytest tests/ -v --cov=src/photo_cleaner --cov-report=xml --cov-report=term --cov-report=html:coverage_html
    
    - name: Archive coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ matrix.os }}-py${{ matrix.python-version }}
        path: coverage_html/
        retention-days: 30
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-py${{ matrix.python-version }}-${{ matrix.os }}
        fail_ci_if_error: false

  lint:
    name: Code Quality (Lint & Format)
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install ruff black mypy pylint
    
    - name: Run ruff (linting)
      run: |
        ruff check src/ tests/ --output-format=github
      continue-on-error: true
    
    - name: Run ruff (formatting check)
      run: |
        ruff format src/ tests/ --check
      continue-on-error: true
    
    - name: Run black (format check)
      run: |
        black --check src/ tests/
      continue-on-error: true
    
    - name: Run pylint
      run: |
        pylint src/photo_cleaner --exit-zero --max-line-length=120 --disable=C0103,C0114,C0115,C0116,R0913
      continue-on-error: true
    
    - name: Run mypy (type checking)
      run: |
        mypy src/photo_cleaner --ignore-missing-imports --no-error-summary || true
      continue-on-error: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit safety
    
    - name: Run bandit (security check)
      run: |
        bandit -r src/photo_cleaner -f json -o bandit-report.json || true
        bandit -r src/photo_cleaner
      continue-on-error: true
    
    - name: Check dependencies for vulnerabilities
      run: |
        pip install -r requirements.txt
        safety check --json || true
      continue-on-error: true
    
    - name: Archive security report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-report
        path: bandit-report.json
        retention-days: 30

  build:
    name: Build & Package
    runs-on: ${{ matrix.os }}
    needs: [test, lint]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: photo-cleaner-linux
          - os: windows-latest
            artifact_name: photo-cleaner-windows.exe
          - os: macos-latest
            artifact_name: photo-cleaner-macos
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build with PyInstaller (Windows)
      if: runner.os == 'Windows'
      run: |
        pyinstaller PhotoCleaner.spec --distpath ./dist --workpath ./build --specpath .
    
    - name: Build with PyInstaller (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        pyinstaller PhotoCleaner.spec --distpath ./dist --workpath ./build --specpath .
    
    - name: Create release archive (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        $zip = (Get-Item PhotoCleaner.exe).BaseName
        Compress-Archive -Path dist/PhotoCleaner -DestinationPath "dist/photo-cleaner-windows-py312.zip"
    
    - name: Create release archive (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        cd dist
        tar -czf photo-cleaner-${{ runner.os }}-py312.tar.gz PhotoCleaner
        cd ..
    
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: dist/
        retention-days: 30

  notify:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test, lint, security]
    if: always()
    
    steps:
    - name: Test Results Summary
      run: |
        echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Tests**: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Linting**: ${{ needs.lint.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Security**: ${{ needs.security.result }}" >> $GITHUB_STEP_SUMMARY
