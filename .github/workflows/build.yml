name: Build & Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (optional)'
        required: false
        default: ''

jobs:
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_release: ${{ steps.version.outputs.is_release }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Determine version
      id: version
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "is_release=true" >> $GITHUB_OUTPUT
        else
          VERSION=$(python -c "import re; content=open('pyproject.toml').read(); match=re.search(r'version = \"(.+?)\"', content); print(match.group(1) if match else '0.0.0')")
          BUILD_NUM="${GITHUB_RUN_ID}"
          echo "version=${VERSION}-build.${BUILD_NUM}" >> $GITHUB_OUTPUT
          echo "is_release=false" >> $GITHUB_OUTPUT
        fi

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: photo-cleaner-linux-${{ needs.version.outputs.version }}
            exe: PhotoCleaner
          - os: windows-latest
            artifact: photo-cleaner-windows-${{ needs.version.outputs.version }}
            exe: PhotoCleaner.exe
          - os: macos-latest
            artifact: photo-cleaner-macos-${{ needs.version.outputs.version }}
            exe: PhotoCleaner
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Run tests before build
      run: |
        pytest tests/unit/ tests/integration/ -v --tb=short || exit 1
    
    - name: Update version in pyproject.toml
      run: |
        python << 'EOF'
        import re
        version = "${{ needs.version.outputs.version }}"
        with open('pyproject.toml', 'r') as f:
          content = f.read()
        content = re.sub(r'version = "[^"]*"', f'version = "{version}"', content)
        with open('pyproject.toml', 'w') as f:
          f.write(content)
        EOF
    
    - name: Build executable (Windows)
      if: runner.os == 'Windows'
      run: |
        pyinstaller PhotoCleaner.spec ^
          --distpath ./dist ^
          --workpath ./build ^
          --specpath . ^
          --clean
    
    - name: Build executable (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        pyinstaller PhotoCleaner.spec \
          --distpath ./dist \
          --workpath ./build \
          --specpath . \
          --clean
    
    - name: Verify build (Windows)
      if: runner.os == 'Windows'
      run: |
        if (Test-Path "dist/PhotoCleaner/PhotoCleaner.exe") {
          echo "✓ Build successful"
          & "dist/PhotoCleaner/PhotoCleaner.exe" --version || true
        } else {
          echo "✗ Build failed - executable not found"
          exit 1
        }
    
    - name: Verify build (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        if [ -f "dist/PhotoCleaner/PhotoCleaner" ]; then
          echo "✓ Build successful"
          chmod +x dist/PhotoCleaner/PhotoCleaner
          ./dist/PhotoCleaner/PhotoCleaner --version || true
        else
          echo "✗ Build failed - executable not found"
          exit 1
        fi
    
    - name: Create Windows release archive
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        $folder = "dist/PhotoCleaner"
        $zipName = "photo-cleaner-windows-${{ needs.version.outputs.version }}.zip"
        Compress-Archive -Path $folder -DestinationPath $zipName
        Write-Host "Created: $zipName"
        Get-Item $zipName | ForEach-Object { Write-Host "Size: $($_.Length) bytes" }
    
    - name: Create Linux/macOS release archive
      if: runner.os != 'Windows'
      run: |
        cd dist
        tar -czf "../photo-cleaner-${{ runner.os }}-${{ needs.version.outputs.version }}.tar.gz" PhotoCleaner
        cd ..
        ls -lh photo-cleaner-*.tar.gz
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: builds-${{ matrix.os }}
        path: |
          photo-cleaner-*.zip
          photo-cleaner-*.tar.gz
        retention-days: 30
    
    - name: Create release (if tag)
      if: needs.version.outputs.is_release == 'true'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          photo-cleaner-*.zip
          photo-cleaner-*.tar.gz
        body: |
          # Release ${{ needs.version.outputs.version }}
          
          ## Build Information
          - Platform: ${{ matrix.os }}
          - Build ID: ${{ github.run_id }}
          - Commit: ${{ github.sha }}
          
          ## Installation
          Download the appropriate archive for your platform and extract it.
          
          See [documentation](https://github.com/${{ github.repository }}/blob/main/docs/README.md) for more information.
        draft: false
        prerelease: ${{ contains(needs.version.outputs.version, 'alpha') || contains(needs.version.outputs.version, 'beta') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [version, build]
    if: always()
    
    steps:
    - name: Check build status
      run: |
        echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Version**: ${{ needs.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Is Release**: ${{ needs.version.outputs.is_release }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Status**: ${{ needs.build.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Artifacts**: Available in Actions" >> $GITHUB_STEP_SUMMARY
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: all-artifacts
    
    - name: List artifacts
      run: |
        echo "Artifacts generated:" >> $GITHUB_STEP_SUMMARY
        find all-artifacts -type f | while read file; do
          size=$(stat -f%z "$file" 2>/dev/null || stat -c%s "$file" 2>/dev/null)
          echo "  - $(basename $file) ($(numfmt --to=iec $size 2>/dev/null || echo $size))" >> $GITHUB_STEP_SUMMARY
        done || true
